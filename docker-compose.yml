services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdbpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.25.0
    entrypoint: ["/bin/sh", "-ecx", "/nakama/nakama migrate up --database.address nakama:localdbpass@postgres:5432/nakama && exec /nakama/nakama --config /nakama.yml"]
    environment:
      NAKAMA_ADMIN_PASSWORD: adminpass123
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./backend/data/modules:/nakama/data/modules
      - ./nakama.yml:/nakama.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
